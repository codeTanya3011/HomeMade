{% load static %}
{% load carts_tags %}

{% user_carts request as carts %}

<div>
    <button id="modalButton"
        aria-expanded="false"
        class="btn dropdown-toggle fs-5" 
        type="button" 
        data-bs-toggle="dropdown" 
        aria-expanded="false">
        <img src="{% static "deps/icons/cart-plus.svg" %}" alt="Catalog Icon" width="32"
            height="32">
        <span id="goods-in-cart-count">{{ carts.total_quantity }}</span>
    </button>
</div>
<!-- Разметка модального окна корзины -->
<div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel"
    aria-hidden="true">
    <div class="modal-dialog modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="btn-close" data-bs-dismiss="modal"
                    aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <h3 class="text-center mb-4">Cart 🧺</h3>
                <div class="container" id="cart-items-container">
                    <!-- Разметка корзины -->
                   {% include "carts/includes/included_cart.html" %}
                    <!-- Закончилась разметка корзины -->
                </div>  
            </div>
        </div>
    </div>
</div>
